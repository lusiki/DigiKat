project:
  type: website
  output-dir: docs
  resources:
    - assets/
  # Only the real site pages render. Prevents auto-globbing root .md
  # (CLAUDE.local.md, MEMORY.md, WORKFLOW_SUGGESTIONS*.md …) and the design/ mockup
  # into the published docs/.
  render:
    - pages/**/*.qmd

website:
  title: "DigiKat"
  site-url: https://lusiki.github.io/DigiKat/
  navbar:
    left:
      - text: "Osnovne informacije"
        href: pages/index.qmd
      - text: "Baza podataka"
        href: pages/baza.qmd
      - text: "O projektu"
        href: pages/about.qmd
      - text: "Projektni raspored"
        href: pages/schedule.qmd
      - text: "Mapa medijskog prostora"
        menu:
          - text: "Mapa ekosustava"
            href: pages/mapa/mapa.qmd
          - text: "Tematske struje"
            href: pages/mapa/mapa_stats.qmd
          - text: "Atmosfera diskursa"
            href: pages/mapa/diskurs.qmd
          - text: "Fokus na događaje i kampanje"
            href: pages/mapa/događaji.qmd
      - text: "Tematska istraživanja"
        menu:
          - text: "Analiza self-help sadržaja na YouTube-u"
            href: pages/studije/self-help-youtube.qmd
          - text: "Hodočasnički turizam"
            href: pages/studije/hodocasnicki-turizam.qmd
          - text: "Demokršćanstvo"
            href: pages/studije/demokrscanstvo.qmd
          - text: "Katoličko obrazovanje"
            href: pages/studije/katolicko-obrazovanje.qmd
          - text: "Prikazivanje katoličkih svetaca i svetica"
            href: pages/studije/katolicki-sveci-i-svetice.qmd
      - text: "Obavijesti"
        href: pages/news.qmd
      - text: "Resursi"
        href: pages/resources.qmd
    right:
      - text: "O stranici"
        href: pages/site-info.qmd
      - icon: github
        href: https://github.com/lusiki/DigiKat
  page-footer:
    background: "#0f1419"
    foreground: "#aeb4b8"
    border: false
    left: |
      **DigiKat** · Hrvatsko katoličko sveučilište
    center:
      - text: "Baza podataka"
        href: pages/baza.qmd
      - text: "Metodologija"
        href: pages/about.qmd
      - text: "Resursi"
        href: pages/resources.qmd
      - text: "GitHub"
        href: https://github.com/lusiki/DigiKat
    right: |
      CC BY 4.0 · © 2021–2025 DigiKat

# Reuse cached chunk executions; a full render only re-runs pages whose code
# changed (the heavy analytical pages read the 1.2 GB master + data/nlp/).
execute:
  freeze: auto

format:
  html:
    theme:
      - cosmo
      - assets/css/custom.scss
    toc: true
    toc-location: left
    toc-depth: 3
    smooth-scroll: true
    echo: false
    code-fold: false
    code-tools: false
    code-copy: true
    mainfont: "Source Sans 3"
    monofont: "IBM Plex Mono"
    fig-align: center
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Source+Sans+3:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
